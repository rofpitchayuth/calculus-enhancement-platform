name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Select service to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - kt-service
          - llm-service

permissions:
  packages: write
  contents: read

jobs:
  publish-backend:
    if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'backend' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-kt-service:
    if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'kt-service' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push KT service
        uses: docker/build-push-action@v7
        with:
          context: ./ml-services/KT_service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/kt-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-llm-service:
    if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'llm-service' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push LLM service
        uses: docker/build-push-action@v7
        with:
          context: ./ml-services/LLM_service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/llm-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
